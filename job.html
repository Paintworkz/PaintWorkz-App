<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>PaintWorkz — Job Info</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px 40px;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            color: #d4af37;
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-align: center;
        }

        .logo-sub {
            font-size: 10px;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
            text-align: center;
        }

        .card {
            background: #1c1c1e;
            border: 2px solid #d4af37;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 10px;
            font-weight: 900;
            color: #d4af37;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .job-number {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            margin-bottom: 4px;
        }

        .job-client {
            font-size: 18px;
            font-weight: 700;
            color: #d4af37;
            text-align: center;
            margin-bottom: 16px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a2a;
            gap: 12px;
        }

        .row:last-child { border-bottom: none; }

        .row-label {
            font-size: 10px;
            font-weight: 900;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            padding-top: 1px;
        }

        .row-value {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            text-align: right;
        }

        .colour-chip {
            display: inline-block;
            background: #2c2c2e;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            margin: 3px 0 3px 4px;
        }

        .finish-badge {
            display: inline-block;
            background: #2c2c2e;
            border: 1px solid #555;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 900;
            color: #d4af37;
        }

        .open-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 900;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            margin-top: 8px;
        }

        .footer {
            margin-top: 32px;
            font-size: 10px;
            color: #444;
            text-align: center;
            letter-spacing: 1px;
        }

        .no-data {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

    <div class="logo">PAINTWORKZ</div>
    <div class="logo-sub">Job Information</div>

    <div id="content"></div>

    <div class="footer">PaintWorkz Pro © 2026</div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const job      = p.get('job')      || '';
        const client   = p.get('client')   || '';
        const finish   = p.get('finish')   || '';

        // colours|parts|profiles|type are pipe-separated per colour
        // e.g. colours=Lexicon|Vivid White  parts=12|8  profiles=Shaker|Plain  types=Satin|Gloss
        const coloursRaw  = p.get('colours')  || p.get('colour') || '';
        const partsRaw    = p.get('parts')    || '';
        const profilesRaw = p.get('profiles') || '';
        const typesRaw    = p.get('types')    || p.get('type') || '';

        const colourList  = coloursRaw.split('|').map(c => c.trim()).filter(Boolean);
        const partsList   = partsRaw.split('|').map(c => c.trim());
        const profilesList= profilesRaw.split('|').map(c => c.trim());
        const typesList   = typesRaw.split('|').map(c => c.trim());

        const el = document.getElementById('content');

        if (!job) {
            el.innerHTML = `<div class="no-data">
                <div style="font-size:40px;margin-bottom:12px;">🔍</div>
                <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:8px;">No job data found</div>
                <div style="font-size:12px;">Scan a PaintWorkz shop label QR code to view job details.</div>
            </div>`;
        } else {
            // Header card
            let html = `
                <div class="card">
                    <div class="card-title">📋 Job Details</div>
                    <div class="job-number">Job #${job}</div>
                    <div class="job-client">${client}</div>
                    ${finish ? `<div class="row">
                        <div class="row-label">📅 Scheduled Finish</div>
                        <div class="row-value">${finish}</div>
                    </div>` : ''}
                </div>`;

            // One card per colour
            colourList.forEach((colour, i) => {
                const pts      = partsList[i]    || '';
                const profs    = profilesList[i] || '';
                const finType  = typesList[i]    || '';
                html += `
                <div class="card" style="border-color:#555; margin-bottom:12px;">
                    <div class="card-title" style="color:#fff;">🎨 Colour ${colourList.length > 1 ? (i + 1) + ' of ' + colourList.length : ''}</div>
                    <div class="row">
                        <div class="row-label">Colour</div>
                        <div class="row-value"><span class="colour-chip">${colour}</span></div>
                    </div>
                    ${finType ? `<div class="row">
                        <div class="row-label">✨ Finish</div>
                        <div class="row-value"><span class="finish-badge">${finType}</span></div>
                    </div>` : ''}
                    ${pts ? `<div class="row">
                        <div class="row-label">🚪 Parts</div>
                        <div class="row-value">${pts}</div>
                    </div>` : ''}
                    ${profs ? `<div class="row">
                        <div class="row-label">📐 Profiles</div>
                        <div class="row-value">${profs}</div>
                    </div>` : ''}
                </div>`;
            });

            html += `<a class="open-btn" href="https://paintworkz.github.io/PaintWorkz-App/">Open PaintWorkz App →</a>`;
            el.innerHTML = html;
        }
    </script>
</body>
</html>
