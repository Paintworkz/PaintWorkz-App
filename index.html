<script>
async function cleanupDuplicateJobs() {
    console.log('🧹 Starting duplicate job cleanup...');
    
    // 1. Load local jobs
    const jobHistory = JSON.parse(localStorage.getItem('jobHistory') || '[]');
    console.log(`Found ${jobHistory.length} total jobs in localStorage`);
    
    // 2. Group by jobNum to find duplicates
    const jobsByNum = {};
    jobHistory.forEach(job => {
        const num = job.jobNum;
        if (!jobsByNum[num]) {
            jobsByNum[num] = [];
        }
        jobsByNum[num].push(job);
    });
    
    // 3. Find and report duplicates
    const duplicates = Object.entries(jobsByNum).filter(([num, jobs]) => jobs.length > 1);
    console.log(`Found ${duplicates.length} job numbers with duplicates:`);
    duplicates.forEach(([num, jobs]) => {
        console.log(`  Job #${num}: ${jobs.length} copies`, jobs.map(j => ({id: j.id, client: j.client, timeline: j.timeline})));
    });
    
    // 4. Deduplicate - keep MOST RECENT (highest lastModified or newest id)
    const deduped = [];
    Object.entries(jobsByNum).forEach(([num, jobs]) => {
        if (jobs.length === 1) {
            deduped.push(jobs[0]);
        } else {
            // Sort by lastModified or id (newest first)
            jobs.sort((a, b) => {
                const dateA = a.lastModified || a.id || '0';
                const dateB = b.lastModified || b.id || '0';
                return dateB.localeCompare(dateA);
            });
            console.log(`  Keeping most recent #${num}:`, jobs[0].id);
            deduped.push(jobs[0]);
        }
    });
    
    console.log(`Reduced from ${jobHistory.length} to ${deduped.length} jobs`);
    
    // 5. Save deduplicated array
    localStorage.setItem('jobHistory', JSON.stringify(deduped));
    console.log('✅ localStorage cleaned');
    
    // 6. Clean up Firestore - delete duplicate documents
    if (window.currentUser && window.firebaseDb) {
        console.log('🔥 Cleaning Firestore duplicates...');
        const userId = window.staffModeOwnerUid || window.currentUser.uid;
        
        for (const [num, jobs] of duplicates) {
            // Delete all but the first (which we kept in deduped)
            for (let i = 1; i < jobs.length; i++) {
                const oldId = jobs[i].id;
                try {
                    const docRef = window.doc(window.firebaseDb, 'users', userId, 'jobs', oldId);
                    await window.deleteDoc(docRef);
                    console.log(`  Deleted Firestore doc: jobs/${oldId} (duplicate of #${num})`);
                } catch(e) {
                    console.warn(`  Could not delete ${oldId}:`, e.message);
                }
            }
        }
        console.log('✅ Firestore cleaned');
    }
    
    console.log('🎉 Cleanup complete! Reload the page.');
    return {
        before: jobHistory.length,
        after: deduped.length,
        duplicatesRemoved: jobHistory.length - deduped.length
    };
}

// Run it
cleanupDuplicateJobs();
</script>
